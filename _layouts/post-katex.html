---
layout: default
---

{% if page.hero %}
<main id="hero">
	<iframe src="{{ page.hero | relative_url }}"></iframe>
</main>
{% endif %}

<article>
	<div class="tag">{{ page.tag }}</div>
	<h1>{{ page.title }}</h1>
	<h2>{{ page.subtitle }}</h2>

	{{ content }}
</article>
